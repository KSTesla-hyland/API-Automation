# This file contains configuration settings for flake8
# http://flake8.readthedocs.org/
# Install with "pip install -r pip_requirements_dev.txt" or "pip install flake8"
# To run flake8 just invoke it against any directory or Python module:
# Run from this folder like "%PYDIR%\scripts\flake8 SetupFolder"
[flake8]
# See list of code at https://pycodestyle.readthedocs.io/en/latest/intro.html#error-codes
ignore = E121,E128,E261,E302
max-line-length = 130
max-complexity = 10
# The following output format is accepted by Visual Studio
format = %(path)s(%(row)d,%(col)d): %(code)s, %(text)s
